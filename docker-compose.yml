version: '3.8'

services:
  viora:
    build: .
    container_name: viora-medical-ai
    ports:
      - "8000:8000"
    volumes:
      - ./viora_comments.db:/app/viora_comments.db
      - ./data:/app/data
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
